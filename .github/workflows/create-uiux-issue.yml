name: Trigger UI/UX Agent on PR Merge

# Trigger: fires when a PR is merged into Planning_Branch, or manually via workflow_dispatch.
# The workflow reads planning.md from the merged branch, extracts the UI/UX section,
# and creates a GitHub Issue assigned to the Copilot coding agent.
# The agent then implements the changes and opens a new PR automatically.
on:
  pull_request:
    types: [closed]
    branches:
      - Planning
  workflow_dispatch:

# Prevent duplicate runs for the same PR
concurrency:
  group: trigger-uiux-${{ github.event.pull_request.number || 'manual' }}
  cancel-in-progress: false

jobs:
  trigger-uiux-agent:
    # Only run when:
    #   1. The PR was actually merged (not just closed), OR this is a manual dispatch.
    #   2. The PR was NOT opened by the Copilot coding agent or GitHub Actions automation
    #      (prevents infinite loops when the agent's own PR is later merged).
    #   3. The source branch does NOT start with "copilot/" (Copilot agent branch prefix).
    if: |
      (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') &&
      github.actor != 'copilot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.head_ref || '', 'copilot/') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-uiux-automation') &&
      (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'planning'))

    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      # Check out the target branch (after merge) so we can read planning.md
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}

      # Check whether planning.md exists; surface a clear message when it is absent
      - name: Check for planning.md
        id: check-planning
        run: |
          if [ -f "planning.md" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::planning.md not found on branch ${{ github.event.pull_request.base.ref || github.ref_name }}. Skipping UI/UX issue creation."
          fi

      # Read planning.md, extract the UI/UX section, and create an issue for the agent
      - name: Create UI/UX agent issue from planning.md
        if: steps.check-planning.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // --- Dedup: skip if an identical open issue already exists ---
            const issueTitle = '[UI/UX] Implement changes from planning.md';
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'copilot',
              per_page: 100,
            });
            const duplicate = existingIssues.find(i => i.title === issueTitle);
            if (duplicate) {
              core.info(`Open issue already exists: #${duplicate.number} — skipping creation.`);
              return;
            }

            // --- Ensure required labels exist (create if missing) ---
            const requiredLabels = ['ui/ux', 'copilot'];
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  label,
                  color: label === 'copilot' ? '1d76db' : 'a2eeef',
                });
                core.info(`Created missing label: "${label}"`);
              }
            }

            // Read planning.md from the checked-out workspace
            const planningContent = fs.readFileSync('planning.md', 'utf8');

            // Extract the UI/UX section.
            // Matches any ##-level heading that starts with "UI" followed by optional
            // separators (space, slash, hyphen) then "UX" — e.g. "## UI/UX Changes",
            // "## UI-UX", "## UI UX" — and captures everything up to the next ##-level
            // heading or end of file.
            const uiuxMatch = planningContent.match(/##\s+UI[\s/\-]*UX[\s\S]*?(?=\n##\s|$)/i);
            const uiuxSection = uiuxMatch
              ? uiuxMatch[0].trim()
              : '<!-- Full planning.md included below (no dedicated UI/UX section found) -->\n\n' + planningContent.trim();

            const pr = context.payload.pull_request;
            const prLine = pr
              ? `Triggered by merged PR [#${pr.number} — ${pr.title}](${pr.html_url}).`
              : 'Triggered manually via workflow_dispatch.';

            const issueBody = [
              '## UI/UX Implementation Task',
              '',
              prLine,
              '',
              '---',
              '',
              '### UI/UX Changes from `planning.md`',
              '',
              uiuxSection,
              '',
              '---',
              '',
              '### Instructions for the UI/UX Agent',
              '',
              'Please implement **all** UI/UX changes described above in the `frontend/` application.',
              '',
              '- Follow the agent configuration in `.github/agents/uiux.agent.md`.',
              '- Make code changes only in `frontend/` (no backend changes).',
              '- Open a new Pull Request with the implemented changes.',
              '- Label your PR with `automated-uiux` to prevent re-triggering this workflow.',
              '',
              '**Agent:** `ui-uxagent`',
              '**Source of truth:** `planning.md` at the root of the repository',
            ].join('\n');

            const createParams = {
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  issueTitle,
              body:   issueBody,
              labels: ['ui/ux', 'copilot'],
            };

            // Assign to 'copilot' when GitHub Copilot is enabled for this repo.
            // Wrapped in try/catch so an invalid assignee does not fail the workflow.
            try {
              await github.rest.issues.checkUserCanBeAssigned({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                assignee: 'copilot',
              });
              createParams.assignees = ['copilot'];
            } catch {
              core.warning('Assignee "copilot" is not valid for this repository — skipping assignment.');
            }

            const { data: issue } = await github.rest.issues.create(createParams);
            core.info(`Created issue #${issue.number}: ${issue.html_url}`);
