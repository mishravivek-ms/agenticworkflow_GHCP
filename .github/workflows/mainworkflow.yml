name: Create multiple issues

# Trigger: fires only when a pull request is merged.
# The workflow creates three GitHub issues for UI/UX, backend, and testing work.
on:
  pull_request:
    types: [closed]

# Prevent duplicate runs for the same PR
concurrency:
  group: trigger-uiux-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  trigger-uiux-agent:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create agent issues from planning.md
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = [
              {
                title: 'UI/UX changes',
                body:  'Make the change of UI/UI only based on plan.md file',
              },
              {
                title: 'Backend changes',
                body:  'Make the change of backend services only based on plan.md file',
              },
              {
                title: 'Testing changes',
                body:  'Make the change of testing framework based on plan.md file',
              },
            ];

            for (const issue of issues) {
              const createParams = {
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  issue.title,
                body:   issue.body,
              };

              const { data: created } = await github.rest.issues.create(createParams);
              core.info(`Created issue #${created.number}: ${created.html_url}`);
            }
