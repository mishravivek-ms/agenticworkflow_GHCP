name: Create multiple issues

# Trigger: fires when a PR is merged into Planning_Branch, or manually via workflow_dispatch.
# The workflow reads planning.md from the merged branch, extracts the UI/UX section,
# and creates a GitHub Issue assigned to the Copilot coding agent.
# The agent then implements the changes and opens a new PR automatically.
on:
  pull_request:
    types: [closed]
    branches:
      - Planning_Branch
  workflow_dispatch:

# Prevent duplicate runs for the same PR
concurrency:
  group: trigger-uiux-${{ github.event.pull_request.number || 'manual' }}
  cancel-in-progress: false

jobs:
  trigger-uiux-agent:
    # Only run when:
    #   1. The PR was actually merged (not just closed), OR this is a manual dispatch.
    #   2. The PR was NOT opened by the Copilot coding agent or GitHub Actions automation
    #      (prevents infinite loops when the agent's own PR is later merged).
    #   3. The source branch does NOT start with "copilot/" (Copilot agent branch prefix).
    if: |
      (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') &&
      github.actor != 'copilot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.head_ref || '', 'copilot/') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-uiux-automation') 

    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      # Check out the target branch (after merge) so we can read planning.md
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}

      # Check whether planning.md exists; surface a clear message when it is absent
      - name: Check for planning.md
        id: check-planning
        run: |
          if [ -f "planning.md" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::planning.md not found on branch ${{ github.event.pull_request.base.ref || github.ref_name }}. Skipping UI/UX issue creation."
          fi

      # Create three issues: UI/UX, Backend, and Testing
      - name: Create agent issues from planning.md
        if: steps.check-planning.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // --- Ensure the 'copilot' label exists ---
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'copilot',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'copilot',
                color: '1d76db',
              });
              core.info('Created missing label: "copilot"');
            }

            // --- Check if copilot can be assigned ---
            let canAssignCopilot = false;
            try {
              await github.rest.issues.checkUserCanBeAssigned({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                assignee: 'copilot',
              });
              canAssignCopilot = true;
            } catch {
              core.warning('Assignee "copilot" is not valid for this repository — skipping assignment.');
            }

            // --- Fetch existing open copilot issues for dedup ---
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'copilot',
              per_page: 100,
            });

            // --- Define the three issues ---
            const issues = [
              {
                title: 'UI/UX changes',
                body:  'Make the change of UI/UX only based on plan.md file',
              },
              {
                title: 'Backend changes',
                body:  'Make the change of backend services only based on plan.md file',
              },
              {
                title: 'Testing changes',
                body:  'Make the change of testing framework based on plan.md file',
              },
            ];

            // --- Create each issue (skip duplicates) ---
            for (const issue of issues) {
              const duplicate = existingIssues.find(i => i.title === issue.title);
              if (duplicate) {
                core.info(`Open issue already exists: #${duplicate.number} "${issue.title}" — skipping.`);
                continue;
              }

              const createParams = {
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  issue.title,
                body:   issue.body,
                labels: ['copilot'],
              };

              if (canAssignCopilot) {
                createParams.assignees = ['copilot'];
              }

              const { data: created } = await github.rest.issues.create(createParams);
              core.info(`Created issue #${created.number}: ${created.html_url}`);
            }
