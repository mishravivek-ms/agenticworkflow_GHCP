<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card" role="main">
      <h1 class="card__title">Sign In</h1>

      <div id="alert" class="alert" aria-live="polite" hidden></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label class="field__label" for="username">Username</label>
          <input
            class="field__input"
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            required
          />
          <span class="field__error" id="username-error"></span>
        </div>

        <div class="field">
          <label class="field__label" for="password">Password</label>
          <input
            class="field__input"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          />
          <span class="field__error" id="password-error"></span>
        </div>

        <button class="btn" type="submit" id="submit-btn">Login</button>
      </form>
    </div>

    <script src="app.js"></script>
  </body>
</html>
